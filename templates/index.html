<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>📊 Predict Insurance Cost</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input, select {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #2980b9;
        }

        input:invalid {
            border-color: #e74c3c;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>💰 Insurance Cost Prediction</h2>
    <form action="/predict" method="post">
        <input type="number" step="any" name="age" placeholder="Age" min="0" required>
        
        <select name="sex" required>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
        
        <input type="number" step="any" name="bmi" placeholder="BMI" required>
        <input type="number" name="children" placeholder="Number of Children" min="0" required>
        
        <select name="smoker" required>
            <option value="">Smoking Status</option>
            <option value="yes">Smoker</option>
            <option value="no">Non-Smoker</option>
        </select>
        
        <select name="region" required>
            <option value="">Select Region</option>
            <option value="southeast">Southeast</option>
            <option value="southwest">Southwest</option>
            <option value="northeast">Northeast</option>
            <option value="northwest">Northwest</option>
        </select>
        
        <button type="submit">Predict</button>
    </form>
</div>

</body>
</html>

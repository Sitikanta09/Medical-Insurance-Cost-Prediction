<!DOCTYPE html>
<html>
<head>
    <title>Insurance Cost Prediction Result</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .center-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f4f8;
        }

        .result-container {
            background-color: white;
            padding: 30px;
            width: 400px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            border-radius: 10px;
            text-align: center;
        }

        .prediction {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .logout-btn {
            background-color: #e74c3c;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 20px;
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

<div class="center-wrapper">
    <div class="result-container">
        <div class="prediction">
            {{ prediction_text }}
        </div>
        <form action="{{ url_for('logout') }}" method="get">
            <button class="logout-btn" type="submit">Logout</button>
        </form>
    </div>
</div>

</body>
</html>
